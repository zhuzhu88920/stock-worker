# ============================================================
# 股票监控配置文件
# 交易日历数据已迁移至 trading-calendar-api
# config.toml 仅保留监控标的配置
# ============================================================

# ============================================================
# 股票列表
# 格式: "代码,名称"
# ============================================================

[stocks]
# A股基金
cn_fund = [
  "005698,华夏全球科技",
  "377240,摩根新兴动力",
  "017641,摩根标普500",
  "019172,摩根纳指100",
]

# 港股
hk = [
  "07709,2x海力士",
]

# 韩股
kr = [
  "000660,海力士",
]

# 美股
us = [
  "MU,Micron",
  "DRAM,Roundhill Memory ETF",
  "GLW,Corning",
]

# ============================================================
# 市场配置（不含交易时段，由 API 提供）
# ============================================================

# A股基金
[markets.cn_fund]
name = "A股基金"
flag = "🇨🇳"
timezone = "Asia/Shanghai"
# 数据源
datasource = "https://fundmobapi.eastmoney.com/FundMNewApi/FundMNFInfo?pageIndex=1&pageSize=1&plat=Android&appType=ttjj&product=EFund&Version=1&Fcodes={code}&deviceid={timestamp}"

# 港股
[markets.hk]
name = "港股"
flag = "🇭🇰"
timezone = "Asia/Hong_Kong"
# 数据源
datasource = "https://qt.gtimg.cn/q=hk{code}"

# 韩股
[markets.kr]
name = "韩股"
flag = "🇰🇷"
timezone = "Asia/Seoul"
# 数据源
datasource = "https://m.stock.naver.com/api/stock/{code}/basic"
referer = "https://m.stock.naver.com/item/main.naver?code={code}"

# 美股
[markets.us]
name = "美股"
flag = "🇺🇸"
timezone = "America/New_York"
# 数据源 (Yahoo Finance)
datasource = "https://query1.finance.yahoo.com/v8/finance/chart/{code}"

# ============================================================
# 元数据
# ============================================================

[meta]
version = "2.0"
note = "交易日历已迁移至 trading-calendar-api"
