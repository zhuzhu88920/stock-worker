us = []

# ============================================================
# 市场配置
# ============================================================

# A股基金
[markets.cn_fund]
name = "A股基金"
flag = "🇨🇳"
timezone = "Asia/Shanghai"
# 净值更新时段（+1分钟确保收市价被抓到）
trading_hours = [
  { start = "19:00", end = "21:01" }
]
# 数据源
datasource = "https://fundmobapi.eastmoney.com/FundMNewApi/FundMNFInfo?pageIndex=1&pageSize=1&plat=Android&appType=ttjj&product=EFund&Version=1&Fcodes={code}&deviceid={timestamp}"

# 港股
[markets.hk]
name = "港股"
flag = "🇭🇰"
timezone = "Asia/Hong_Kong"
# 盘前竞价 + 正常交易（+1分钟确保收市价被抓到）
trading_hours = [
  { start = "09:00", end = "09:30", type = "pre_market" },
  { start = "09:30", end = "16:01", type = "regular" }
]
# 数据源
datasource = "https://qt.gtimg.cn/q=hk{code}"

# 韩股
[markets.kr]
name = "韩股"
flag = "🇰🇷"
timezone = "Asia/Seoul"
# 正常交易 09:00-15:30 + 盘后（首尔时间，+1分钟确保收市价被抓到）
trading_hours = [
  { start = "09:00", end = "15:30", type = "regular" },
  { start = "15:30", end = "16:01", type = "after_hours" }
]
# 数据源
datasource = "https://m.stock.naver.com/api/stock/{code}/basic"
referer = "https://m.stock.naver.com/item/main.naver?code={code}"

# 美股
[markets.us]
name = "美股"
flag = "🇺🇸"
timezone = "America/New_York"
# 夏令时 (3月第二个周日 - 11月第一个周日)
trading_hours_summer = [
  { start = "04:00", end = "09:30", type = "pre_market" },
  { start = "09:30", end = "16:01", type = "regular" },
  { start = "16:00", end = "20:01", type = "after_hours" }
]
# 冬令时 (11月第一个周日 - 3月第二个周日)
trading_hours_winter = [
  { start = "04:00", end = "09:30", type = "pre_market" },
  { start = "09:30", end = "16:01", type = "regular" },
  { start = "16:00", end = "20:01", type = "after_hours" }
]
# 数据源 (Finnhub)
datasource = "https://finnhub.io/api/v1/quote?symbol={code}&token={FINNHUB_API_KEY}"

