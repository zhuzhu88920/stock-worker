cn_fund = [
  "005698,华夏全球科技",
  "377240,摩根新兴动力",
  "017641,摩根标普500",
  "019172,摩根纳指100",
]

# 港股 (盘前竞价: 09:00-09:30, 开盘: 09:30, 收盘: 16:00)
hk = [
  "07709,2x海力士",
]

# 韩股 (开盘: 09:00首尔/08:00北京, 收盘: 15:30首尔/14:30北京)
kr = [
  "000660,海力士",
]

