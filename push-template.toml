# ============================================================
# 推送模板配置
# 使用占位符自定义推送格式
# ============================================================

# 标题模板
# 可用占位符:
#   {market_status} - 市场状态 (如: 🇨🇳开  🇭🇰开  🇰🇷开  🇺🇸休)
#   {date} - 日期 (如: 2026/05/03)
#   {time} - 时间 (如: 18:49)
[title]
template = "{market_status} ⏰ {time}"

# 内容模板
# 可用占位符:
#   {flag} - 市场国旗 (如: 🇨🇳)
#   {name} - 股票/基金名称
#   {code} - 股票/基金代码
#   {price} - 价格/净值
#   {change_amount} - 涨跌额
#   {change_percent} - 涨跌幅
#   {trend} - 涨跌图标 (📈/📉/➡️)
#   {nav_date} - 净值日期 (仅基金)
#   {nav_date_short} - 净值日期简写 (如: 04-29)
[content]
# 韩股模板
kr = "{flag} {name} 💰{price} {trend}{change_amount}({change_percent})"

# 港股模板
hk = "{flag} {name} 💰{price} {trend}{change_amount}({change_percent})"

# A股基金模板
cn_fund = "{flag} {name} 💰{price} {trend} {change_percent} 📅 {nav_date_short}"

# 美股模板
us = "{flag} {name} 💰{price} {trend}{change_amount}({change_percent})"

# ============================================================
# 名称简化规则
# 用于缩短过长的股票/基金名称
# ============================================================

[name_rules]
# 格式: 关键词 = 替换为
华夏全球科技先锋混合 = 华夏全球科技
摩根新兴动力混合A = 摩根新兴动力
摩根标普500指数 = 摩根标普500
摩根纳斯达克100指数 = 摩根纳指100
XL二南方海力士 = 2x海力士
SK하이닉스 = 海力士
(QDII) =
(人民币) =
人民币 =
