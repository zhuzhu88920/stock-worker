name = "stock-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare 账户 ID
account_id = "7eeac3798da0cafbdd84901d4d9fab18"

# KV 命名空间（配置 + 数据存储共用）
[[kv_namespaces]]
binding = "CONFIG"
id = "4010908b8c564128a7f3bba963f99790"

# 环境变量
[vars]
# Finnhub API Key (美股数据源)
FINNHUB_API_KEY = ""

# Cron 触发器（每5分钟）
[triggers]
crons = ["1/5 * * * *"]
