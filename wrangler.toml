name = "stock-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "stock-worker-db"
database_id = "your-database-id"

# KV 命名空间 (用于存储配置)
[[kv_namespaces]]
binding = "CONFIG"
id = "your-kv-namespace-id"

# 环境变量
[vars]
# Bark 推送配置
# 格式: https://api.day.app/your-bark-key
BARK_URL = "https://api.day.app/your-bark-key"

# Finnhub API Key (美股数据源)
FINNHUB_API_KEY = "your-finnhub-api-key"

# Cron 触发器（每5分钟）
[triggers]
crons = ["*/5 * * * *"]
